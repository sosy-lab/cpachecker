spec:
  inputs:
    extended_tests:
      description: "Run extended set of unit and integration tests"
      type: boolean
      default: false
    tests_per_java_version:
      description: "Run tests on several Java versions instead of just one"
      type: boolean
      default: false
---

include: build/gitlab-ci.yml

variables:
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"
  npm_config_cache: "${CI_PROJECT_DIR}/.cache/npm"
  npm_config_prefer_offline: "true"

.pip-cache: &pip-cache
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - ".cache/pip"

.node-cache: &node-cache
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - ".cache/npm"

.binary_check: &binary_check
  stage: checks

.configuration-checks: &configuration-checks
  <<: *binary_check
  script: "ant $ANT_PROPS_CHECKS configuration-checks"
  artifacts:
    paths:
      - "ConfigurationChecks.html"
      - "hs_err_pid*.log"
    when: always
    reports:
      junit: "output/configuration-checks/TESTS-TestSuites.xml"

configuration-checks:jdk-21:
  <<: *configuration-checks
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21
  image: ${CI_REGISTRY_IMAGE}/test:jdk-21

configuration-checks:jdk-25:
  <<: *configuration-checks
  dependencies:
    - build-dependencies
    - build:jdk-25
  needs:
    - build-dependencies
    - build:jdk-25
  image: ${CI_REGISTRY_IMAGE}/test:jdk-25
  rules:
    - if: $CI_MERGE_REQUEST_EVENT_TYPE == "merge_train"
    - if: $[[ inputs.tests_per_java_version ]] == true


configuration-documentation:
  <<: *binary_check
  script:
    - "cp doc/ConfigurationOptions.txt doc/ConfigurationOptions.txt.old"
    - "ant $ANT_PROPS_CHECKS build-documentation -Ddocumentation.uptodate=false"
    - "diff doc/ConfigurationOptions.txt.old doc/ConfigurationOptions.txt"
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21


configuration-plot:
  stage: checks
  script:
    - "mkdir -p output"
    - "touch output/AssumptionAutomaton.txt"
    - "scripts/configViz.py > ConfigurationPlot.dot"
    - "dot -Tsvg ConfigurationPlot.dot -O"
  dependencies: []
  needs: []
  artifacts:
    paths:
      - "ConfigurationPlot.dot.svg"


forbidden-apis:
  <<: *binary_check
  script: "ant $ANT_PROPS_CHECKS forbiddenapis"
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21


check-code-patterns:
  stage: checks
  script: "build/check-code-patterns.sh"
  dependencies: []
  needs: []
  image: ubuntu:22.04


python-unit-tests:
  <<: *binary_check
  script: "python3 -m unittest discover scripts"
  # The tests run CPAchecker, so they need the respective image and dependencies.
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21
  image: ${CI_REGISTRY_IMAGE}/test:jdk-21


javascript-build:
  stage: checks
  dependencies: []
  needs: []
  image: ${CI_REGISTRY_IMAGE}/test:node
  before_script:
    - cd src/org/sosy_lab/cpachecker/core/counterexample/
    - npm ci
  script:
    - npm run build
    - git diff --stat --exit-code
  artifacts:
    paths:
      -  src/org/sosy_lab/cpachecker/core/counterexample/build
    when: on_failure
  <<: *node-cache

javascript-unit-tests:
  stage: checks
  dependencies: []
  needs: []
  image: ${CI_REGISTRY_IMAGE}/test:node
  before_script:
    - cd src/org/sosy_lab/cpachecker/core/counterexample/
    - npm ci
  script:
    - npm test
  cache:
    paths:
    - "src/org/sosy_lab/cpachecker/core/counterexample/node_modules/"
  artifacts:
    paths:
      - src/org/sosy_lab/cpachecker/core/counterexample/unit_testing_report.html
    when: always
  <<: *node-cache

javascript-eslint:
  stage: checks
  dependencies: []
  needs: []
  image: ${CI_REGISTRY_IMAGE}/test:node
  before_script:
    - cd src/org/sosy_lab/cpachecker/core/counterexample/
    - npm ci
  script:
    - npm run lint
  <<: *node-cache


build-docker:test:java-node:
  extends: .build-docker
  variables:
    DOCKERFILE: build/gitlab-ci.Dockerfile.java-node
    IMAGE: /test:java-node

build-docker:test:node:
  extends: .build-docker
  variables:
    DOCKERFILE: build/gitlab-ci.Dockerfile.node
    IMAGE: /test:node

build-docker:dev-base:
  extends: .build-docker
  variables:
    DOCKERFILE: build/Dockerfile.dev-base
    IMAGE: ":dev-base"

# Build container images and push to Docker Hub
.build-docker-hub:
  image:
    name: quay.io/podman/stable
  variables:
    BUILD_CONTEXT: "-"
  tags:
    - podman
  before_script:
    - podman login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD"
    - podman login docker.io --username "$DOCKER_HUB_USER" --password "$DOCKER_HUB_TOKEN"
  script:
    - echo "Building $CI_REGISTRY_IMAGE:$TAG from $DOCKERFILE"
    - podman build --pull -t $CI_REGISTRY_IMAGE:$TAG $BUILD_CONTEXT -f - < $DOCKERFILE
    - podman push $CI_REGISTRY_IMAGE:$TAG
    - podman push $CI_REGISTRY_IMAGE:$TAG docker.io/sosylab/cpachecker:$TAG
  environment: deploy/docker
  rules:
    - if: $DOCKER_HUB_USER == null
      when: never
    - if: $DOCKER_HUB_TOKEN == null
      when: never

build-docker:release:
  stage: images
  extends: .build-docker-hub
  variables:
    DOCKERFILE: build/Dockerfile.release
    TAG: "4.2.2"
  script:
    - !reference [.build-docker-hub, script]
    # also push image to :latest
    - podman push $CI_REGISTRY_IMAGE:$TAG $CI_REGISTRY_IMAGE:latest
    - podman push $CI_REGISTRY_IMAGE:$TAG docker.io/sosylab/cpachecker:latest
  rules:
    - !reference [.build-docker-hub, rules]
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"


javascript-e2e-tests:
  stage: checks
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21
  image: ${CI_REGISTRY_IMAGE}/test:java-node
  before_script:
      # generate example report
    - bin/cpachecker -predicateAnalysis test/programs/simple/SSAMap-bug.c
    - cd src/org/sosy_lab/cpachecker/core/counterexample/
    - npm ci
    - "npx webdriver-manager update --versions.chrome $(dpkg-query --showformat='${Version}' --show google-chrome-stable)"
  script:
    - npm run e2e-test
  cache:
    paths:
    - src/org/sosy_lab/cpachecker/core/counterexample/node_modules/
  artifacts:
    paths:
      - output/Counterexample.1.html
      - src/org/sosy_lab/cpachecker/core/counterexample/e2e-tests-report
    when: always


# Checks for Python code
.base_ruff:
  stage: checks
  dependencies: []
  needs: []
  interruptible: true
  image: ghcr.io/astral-sh/ruff:0.14-alpine
  before_script:
    - ruff --version
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - ".ruff_cache"

check-format-python:
  extends: .base_ruff
  script:
    - "ruff format --check --diff"

flake8:
  stage: checks
  dependencies: []
  needs: []
  image: python:3.8
  before_script:
    - "pip install 'flake8<6' flake8-awesome"
  script:
    - flake8
  <<: *pip-cache


build-tar:
  stage: checks
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21
  script: "ant $ANT_PROPS_CHECKS dist-unix -Dnamet=cpachecker"
  artifacts:
    paths:
      - "cpachecker.tar.bz2"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-docker:
  stage: deploy
  dependencies:
    - build-tar
  needs:
    - build-tar
  extends: .build-docker-hub
  variables:
    DOCKERFILE: build/Dockerfile.dev
    TAG: "dev"
    BUILD_CONTEXT: "."
  rules:
    - !reference [.build-docker-hub, rules]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


# Unit tests are split into basic and extended tests, and coverage is disabled.
unit-tests:jdk-21:
  script: "ant $ANT_PROPS_CHECKS unit-tests"
  artifacts:
    paths:
      - "UnitTests.html"
    reports:
      junit: "output/unit-tests/TESTS-TestSuites.xml"
  rules:
    - if: $CI_MERGE_REQUEST_EVENT_TYPE == "merge_train"
      when: never
    - if: $[[ inputs.extended_tests ]] == true
      when: never
    - when: on_success

unit-tests-extended:jdk-21:
  extends: unit-tests:jdk-21
  script: "ant $ANT_PROPS_CHECKS unit-tests -DenableExtendedTests=true"
  rules:
    - if: $CI_MERGE_REQUEST_EVENT_TYPE == "merge_train"
    - if: $[[ inputs.extended_tests ]] == true

unit-tests:jdk-25:
  script: "ant $ANT_PROPS_CHECKS unit-tests"
  artifacts:
    paths:
      - "UnitTests.html"
    reports:
      junit: "output/unit-tests/TESTS-TestSuites.xml"
  rules:
    - if: $CI_MERGE_REQUEST_EVENT_TYPE == "merge_train"
    - if: $[[ inputs.tests_per_java_version ]] == true


# Separate jobs for integration tests
.integration-tests:
  script: "ant $ANT_PROPS_CHECKS integration-tests"
  artifacts:
    paths:
      - "IntegrationTests.html"
    reports:
      junit: "output/integration-tests/TESTS-TestSuites.xml"

integration-tests:jdk-21:
  extends:
    - unit-tests:jdk-21
    - .integration-tests

integration-tests-extended:jdk-21:
  extends:
    - unit-tests-extended:jdk-21
    - .integration-tests
  script: "ant $ANT_PROPS_CHECKS integration-tests -DenableExtendedTests=true"

integration-tests:jdk-25:
  extends:
    - unit-tests:jdk-25
    - .integration-tests


# Parallelize Refaster job
refaster:
  parallel:
    matrix:
      # Must list all directories of https://gitlab.com/sosy-lab/software/refaster/-/tree/java21/src/org/sosy_lab/refaster/rules here
      - REFASTER_SOURCE_DIR: [common, guava, java, java_collection, truth]
  variables:
    REFASTER_SOURCE_PATTERN: "**/$REFASTER_SOURCE_DIR/**/*.java"


# Override Java version for some jobs
image: ${CI_REGISTRY_IMAGE}/test:jdk-21

spotbugs:
  dependencies:
    - build-dependencies
    - build:jdk-21
  needs:
    - build-dependencies
    - build:jdk-21


# Disable Java 17 jobs
build-docker:test:jdk-17:
  rules:
    - when: never

build:jdk-17:
  rules:
    - when: never

build-ecj:jdk-17:
  rules:
    - when: never

unit-tests:jdk-17:
  rules:
    - when: never

# Disable some checks because they are not used for CPAchecker
javadoc:
  rules:
    - when: never
