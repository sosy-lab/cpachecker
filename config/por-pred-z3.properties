#include por-pred.properties

// Only the SOLVER is swapped, to Z3. Deliberately NOT
// `#include includes/nonlin-z3.properties`: that include switches the
// encoding to `encodeBitvectorAs = INTEGER` / `handleFieldAccess = false`,
// which cannot express `concat`. Almost every goblint-regression/pthread-ext
// task initializes a struct-typed variable (e.g.
// `pthread_mutex_t m = { { 0, 0, 0, 0, 0, { { 0, 0 } } } };`, glibc's mutex
// initializer), and encoding that initializer needs `concat`. Under
// nonlin-z3 this failed hard with "Unsupported feature (concat not
// implemented for NLA encoding)" on essentially every task with such an
// initializer. See por-value-z3.properties for the same fix applied to the
// value analysis's counterexample check.
//
// solver.solver = Z3, NOT Z3_WITH_INTERPOLATION: por-pred.properties runs
// CEGAR, which needs interpolants, so picking a Z3 variant that supports
// interpolation looks like the obvious move -- but Z3 dropped its native
// interpolation procedure after version 4.5, and JavaSMT's
// Z3_WITH_INTERPOLATION keeps that capability alive only via an old,
// separately patched Z3 4.5.0.0 build. That old build's interpolation
// procedure does not reliably support the bitvector/array theory combination
// that bit-precise struct handling needs here: verified empirically on two
// tasks from the goblint-regression struct-initializer cluster above
// (13-privatized_01-priv_nr_true.c, 13-privatized_27-multiple-protecting2_true.c),
// both of which get past the concat error and then fail CEGAR with
// "Refinement failed: Interpolation failed in solver Z3 with message 'theory
// not supported by interpolation or bad proof'" -- i.e. still an ERROR run,
// just with a different message. Plain Z3 (a modern, non-patched build) does
// not have this limitation as a *solver*, only as an *interpolator*, so keep
// it for solving and hand interpolation to MathSAT5 instead, which already
// proves capable of bit-precise interpolation in por-pred.properties.
solver.solver = Z3
solver.interpolationSolver = MATHSAT5
