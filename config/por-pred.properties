specification = specification/sv-comp-reachability.spc
#include includes/predicateAnalysis-PredAbsRefiner-ABEl.properties
#include includes/por.properties

CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.predicate.PredicateCPA
cpa.predicate.precision.sharing = GLOBAL
cpa.predicate.blk.threshold = 1

log.consoleLevel = INFO

# POR renames variables with thread-ID prefixes (e.g. T1_t1::tmp) that are not
# in the variable classification. The "ignore irrelevant variables" optimization
# would skip formula encoding for these renamed variables, losing initializer
# constraints.
cpa.predicate.ignoreIrrelevantVariables = false

# malloc never returns null according to SV-COMP rules (same as svcomp*.properties).
# Without this, the encoding lets any allocation nondeterministically fail, and a
# NULL result makes distinct heap arrays alias at address 0. On weaver tasks
# (e.g. popl20-more-vector-add.wvr) this made a thread's write through one NULL
# array clobber another NULL array's element, yielding a feasible-looking spurious
# counterexample and a wrong FALSE verdict.
cpa.predicate.memoryAllocationsAlwaysSucceed = true
cpa.predicate.refinement.restartAfterRefinements = 1