specification = specification/default.spc
#include includes/predicateAnalysis-PredAbsRefiner-ABEl.properties
#include includes/por.properties

CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.predicate.PredicateCPA
cpa.predicate.precision.sharing = GLOBAL
cpa.predicate.blk.threshold = 1

log.consoleLevel = INFO

# keep renamed POR variables tracked (not in variable classification)
cpa.predicate.ignoreIrrelevantVariables = false

# NOTE: this analysis assumes malloc never fails (SV-COMP rules) to avoid
# spurious NULL-pointer aliasing. That is a program/use-case assumption, so it is
# supplied at invocation rather than hard-coded here; the benchmark definitions
# pass "--option cpa.predicate.memoryAllocationsAlwaysSucceed=true".
cpa.predicate.refinement.restartAfterRefinements = 1