analysis.useParallelAnalyses=true

analysis.preprocessing.MPOR = true

# Set the sequentialization options that performed best over all concurrency memory safety tasks.
analysis.algorithm.MPOR.nondeterminismSource=NEXT_THREAD
analysis.algorithm.MPOR.controlEncodingThread=SWITCH_CASE
analysis.algorithm.MPOR.reduceUntilConflict=true
analysis.algorithm.MPOR.bitVectorEncoding=HEXADECIMAL
analysis.algorithm.MPOR.reductionMode=ACCESS_ONLY
analysis.algorithm.MPOR.pruneBitVectorEvaluations=true

# The analyses used for memory safety properties.
# Analyses copied from: config/components/smg-parallel-memsafety.properties
# We currently have no native analysis for this, so we just always fall back to the sequentialization
parallelAlgorithm.configFiles = ../includes/smg/smgSymbolicExecution-memSafety.properties, \
                                ../includes/smg/smgSymbolicExecution-concreteMemoryAccess-memSafety.properties, \
                                ../includes/smg/smgValueAnalysis-overapproximateConcreteValues-memSafety-with-cex.properties, \
                                ../includes/smg/smgValueAnalysis-memSafety-with-cex.properties, \
                                ../includes/smg/smgSymbolicExecution-overapproximateMemoryAccess-memSafety-with-cex.properties