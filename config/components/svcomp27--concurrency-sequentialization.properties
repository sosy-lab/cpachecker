#include svcomp27--parallel-multipleLoops.properties

limits.time.cpu = 700s

analysis.preprocessing.MPOR = true

# Set the sequentialization options that performed best over all concurrency reachability tasks.
analysis.algorithm.MPOR.reduceUntilConflict=true
analysis.algorithm.MPOR.bitVectorEncoding=HEXADECIMAL
analysis.algorithm.MPOR.reductionMode=ACCESS_ONLY
analysis.algorithm.MPOR.pruneBitVectorEvaluations=true

# These options are necessary for both the native concurrency and sequential analyses, otherwise
# false alarms are reported.
analysis.checkCounterexamples=true
counterexample.checker=CPAchecker
counterexample.checker.config=../cex-checks/predicateAnalysis-concurrency-as-cex-check.properties