#include concurrency-sequentialization-uc-por.properties
#include svcomp27--parallel-multipleLoops.properties

limits.time.cpu = 750s

# Disable redundant parsing of the sequentialization, because it is parsed anyway for the analysis.
# Parsing can take several seconds, so it should be optimized for the svcomp27 configs.
analysis.algorithm.MPOR.validateParse = false

# 'strcpy' resulted in false alarms for multiple concurrent reachability tasks.
# The other unsupported functions are copied from 'svcomp27.properties'
cpa.callstack.unsupportedFunctions=strcpy,pthread_create,pthread_key_create,sin,cos,__builtin_uaddl_overflow,_longjmp,longjmp,siglongjmp,atexit
