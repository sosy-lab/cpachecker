#include parallel-overflow.properties

limits.time.cpu = 200s

analysis.preprocessing.MPOR = true

# Set the sequentialization options that performed best over all concurrency overflow tasks.
analysis.algorithm.MPOR.nondeterminismSource=NEXT_THREAD_AND_NUM_STATEMENTS
analysis.algorithm.MPOR.controlEncodingThread=SWITCH_CASE