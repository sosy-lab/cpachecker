# ------------------------------------------------------------------------------
# This configuration file enables checking for overflows in a setup
# with concurrent threads.
# ------------------------------------------------------------------------------

analysis.useParallelAnalyses=true

# The analyses used for overflow properties. It is a parallel config of the native concurrency
# analysis and the sequential analysis run on the sequentialized program.
parallelAlgorithm.configFiles = concurrency-native--overflow.properties, \
                                concurrency-sequentialization--overflow.properties