# Enables the sequentialization preprocessing for concurrent C programs and the Ignore Sleep (IS)
# Partial Order Reduction (POR) options. This file can be included in another config without any
# additional settings for the sequentialization.

# Enable the sequentialization preprocessing
analysis.preprocessing.MPOR = true

# Enable the Ignore Sleep (IS) partial order reduction (POR) options.
analysis.algorithm.MPOR.reduceIgnoreSleep=true
analysis.algorithm.MPOR.bitVectorEncoding=HEXADECIMAL
analysis.algorithm.MPOR.reductionMode=ACCESS_ONLY
analysis.algorithm.MPOR.pruneBitVectorEvaluations=true