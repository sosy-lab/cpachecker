// ----------------------------------------------------------------------
// Baseline for proving termination with plain unwinding assertions, without
// the loop-continuation candidates used by bmc-prove-termination.properties.
// ----------------------------------------------------------------------

#include bmc-prove-termination.properties

bmc.terminationDisableCandidates = true

termination.config = bmc-prove-termination-no-candidates.properties
