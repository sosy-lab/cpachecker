# ----------------------------------------------------------------------
# This configuration file uses CEGAR with program transformations.
# ----------------------------------------------------------------------

#include predicateAnalysis.properties

cegar.refiner = cpa.predicate.PredicateRefiner

cfa.useProgramTransformations = true
analysis.algorithm.useProgramTransformationCGAR = true

analysis.checkCounterexamples = false
cpa.callstack.skipRecursion = true

# Temporary fix for failing witness export
cpa.arg.exportYamlCorrectnessWitness = false