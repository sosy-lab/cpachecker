// ----------------------------------------------------------------------
// This configuration file enables Bounded Model Checking.
// ----------------------------------------------------------------------

# Value analysis currently does not support recursion
#include includes/bmc-without-valueAnalysis.properties

cpa.loopbound.maxLoopIterationAdjusterFactory = INCREMENT

# Support for recursion
cpa.callstack.depth = 1000000
# BMC does not recognize recursive function as loop heads currently and
# does therefore iterate forever
cpa.predicate.satCheck = 1

// this automaton defines which locations are the error locations
specification = specification/default.spc

#include includes/resource-limits.properties
