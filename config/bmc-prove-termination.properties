// ----------------------------------------------------------------------
// Experimental configuration for proving termination with a BMC-style
// incremental loop bound. This file intentionally disables the default
// safety specification because the algorithm should not search for error
// locations as its primary goal.
// ----------------------------------------------------------------------

#include bmc-incremental.properties
// Keep the initial loop bound explicit for readability.
cpa.loopbound.maxLoopIterations = 1

// Enable the termination-oriented BMC mode.
bmc.terminationMode = true

// ----------------------------------------------------------------------
// Candidate/soundness modes
//
// Default mode: full termination candidates + candidate-coverage soundness.
//   This is the current experimental algorithm. It builds no-continuation
//   candidates from loop heads, simple one-iteration internal guards, and
//   no-exit loops, and proves termination with frontier coverage instead of
//   checkBoundingAssertions.
//
// No-candidates baseline:
//   bmc.terminationDisableCandidates = true
//   bmc.terminationUseLoopHeadOnlyCandidates = false
//   bmc.terminationUseCandidateCoverageForSoundness = false
//   This disables candidate construction and relies only on checkBoundingAssertions.
//
// Loop-head-only baseline:
//   bmc.terminationDisableCandidates = false
//   bmc.terminationUseLoopHeadOnlyCandidates = true
//   bmc.terminationUseCandidateCoverageForSoundness = false
//   This builds only loop-head continuation candidates. Candidate violations skip
//   the current bound, but final soundness still uses checkBoundingAssertions.
// ----------------------------------------------------------------------

// Disable all loop-continuation candidates. Set to true only for the
// no-candidates baseline above.
bmc.terminationDisableCandidates = false

// Restrict candidate construction to loop-head continuation edges. Set to true
// only for the loop-head-only baseline above.
bmc.terminationUseLoopHeadOnlyCandidates = false

// If a termination candidate is violated, the current loop bound is known to be too small.
// Skip the more expensive unwinding-assertion check in that case.
bmc.terminationSkipBoundingAssertionsAfterCandidateViolation = true
// Treat termination candidates as no-continuation obligations at loop-head frontiers.
bmc.terminationUseConjunctiveContinuationCandidates = true
// Once all no-continuation candidates hold, prove soundness from covered frontier states instead
// of checking whether the frontier states themselves are unreachable.
bmc.terminationUseCandidateCoverageForSoundness = true

// Required by CPAchecker for termination-property verification.
termination.config = bmc-prove-termination.properties
