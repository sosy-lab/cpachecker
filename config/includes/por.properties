cpa = cpa.arg.ARGCPA
ARGCPA.cpa = cpa.por.PORCPA
PORCPA.cpa = cpa.composite.CompositeCPA

analysis.traversal.order = dfs
cpa.composite.aggregateBasicBlocks = false
cpa.callstack.unsupportedFunctions=pthread_key_create,pthread_getspecific,pthread_setspecific

cpa.por.aggregateBasicBlocks = true

# POR renames variables with thread-ID prefixes (e.g. T1_t1::tmp) that are not
# in the variable classification. The "ignore irrelevant variables" optimization
# would skip formula encoding for these renamed variables, losing initializer
# constraints.
cpa.predicate.ignoreIrrelevantVariables = false

analysis.traversal.useReversePostorder = false
analysis.traversal.useNumberOfThreads  = true
analysis.traversal.weightedDepth       = false