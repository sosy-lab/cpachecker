specification = specification/sv-comp-reachability.spc
#include includes/valueAnalysis-Cegar.properties
#include includes/por.properties

counterexample.checker.config = cex-checks/por-predicateAnalysis-as-cex-check.properties

# PointerCPA is needed for soundness: without it, the value analysis silently
# drops writes through pointers (*p = ...); see por-value.properties.
CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.value.ValueAnalysisCPA, cpa.pointer2.PointerCPA

log.consoleLevel = INFO
cpa.value.alwaysUseQualifiedNames = true
cpa.value.abstraction.tryRetrieveTrackingWithoutLocation = true