specification = specification/sv-comp-reachability.spc
#include includes/valueAnalysis.properties
#include includes/por.properties
#include includes/nonlin-z3.properties

# The main analysis here is a value analysis and never touches the solver, so the
# nonlin-z3 include above only ever configured the counterexample check. Point at
# a proper cex check instead of at por-pred-z3.properties: that is a full CEGAR
# predicate *analysis*, which abstracts at loops and function boundaries and so is
# not the path-precise single-block check a counterexample check has to be.
counterexample.checker.config = cex-checks/por-predicateAnalysis-as-cex-check-z3.properties

CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.value.ValueAnalysisCPA

log.consoleLevel = INFO