analysis.algorithm.transformToSvLib = true
analysis.algorithm.toSvLib.runAnalysis = true
analysis.algorithm.toSvLib.svLibAnalysisConfiguration = predicateAnalysis-svlib.properties
analysis.algorithm.toSvLib.svLibAnalysisSpecification = ../config/specification/correct-tags.spc

specification = specification/default.spc

# Z3 uses a formula representation that is easier to transform than that employed by MATHSAT5
solver.solver = Z3

# do not ignore variables that are irrelevant to reachability properties
cpa.predicate.ignoreIrrelevantVariables = false
cpa.predicate.useConstraintOptimization = false
cpa.predicate.encodeBitvectorAs = BITVECTOR
