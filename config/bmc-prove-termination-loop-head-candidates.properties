// ----------------------------------------------------------------------
// Baseline for proving termination with only loop-head continuation
// candidates. Candidate violations are used to skip the current bound,
// while final soundness is still checked via unwinding assertions.
// ----------------------------------------------------------------------

#include bmc-prove-termination.properties

bmc.terminationUseLoopHeadOnlyCandidates = true
bmc.terminationUseCandidateCoverageForSoundness = false

termination.config = bmc-prove-termination-loop-head-candidates.properties
