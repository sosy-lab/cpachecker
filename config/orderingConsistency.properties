# Bounded ordering-consistency analysis for concurrent programs: each thread is
# explored separately (all paths, loops unrolled with iterative deepening),
# global-memory accesses become guarded events, and an SMT solver decides whether
# a consistent interleaving reaches an error function (default: reach_error).
# No specification automaton is needed; target detection is built into the
# exploration. Shared scalars, address-taken variables, struct fields, arrays,
# and heap allocations are supported via an (base, offset) address-equality
# model instead of CPAchecker's heap-array pointer aliasing; see oc.md.

analysis.algorithm.OC = true

cpa = cpa.arg.ARGCPA
ARGCPA.cpa = cpa.oc.OrderingConsistencyCPA

# reverse postorder makes control-flow joins merge before they are expanded
analysis.traversal.order = bfs
analysis.traversal.useReversePostorder = true

# We do our own aliasing at the event level (address base/offset equality), so the
# converter must NOT also model pointers with its heap-array (UF) encoding: every
# dereference is rewritten to a fresh value symbol before the converter sees it, and
# turning its aliasing on both double-models memory and crashes its SSA bookkeeping.
cpa.predicate.handlePointerAliasing = false

# accesses are renamed to fresh names unknown to the variable classification
cpa.predicate.ignoreIrrelevantVariables = false
cpa.predicate.ignoreIrrelevantFields = false

# iterative deepening: start at the initial bound, add the step per round, give up
# beyond the final bound (negative = deepen without bound, until the resource limit);
# the unwinding assertion turns "safe and no feasible execution was cut" into TRUE
oc.initialLoopBound = 5
oc.loopBoundStep = 5
oc.finalLoopBound = -1

# The ARG is exported for visualization. The reached set is a forest: each thread instance is its
# own parentless root (a spawned thread is not a control-flow successor of its creator), so ARG.dot
# and Report.html show one tree per thread. Counterexample export is on: the algorithm attaches a
# CounterexampleInfo (a synthetic ARGPath that interleaves the enabled events into one execution) to
# the target state, so the violation flows through the standard export/report infrastructure.
# Coverage stays off (a violation is an SMT model over events, not a single path through the ARG).
coverage.enabled = false
cpa.arg.export = true
counterexample.export.enabled = true
# The counterexample path is a synthetic interleaving (imprecise, no real callstack/assumptions), so
# only the text/graph exports apply. The C-source, witness, and harness exports need a precise ARG
# path and would fail on it; the YAML witness is out of scope for now.
counterexample.export.exportAsSource = false
counterexample.export.exportWitness = false
counterexample.export.exportWitnessV2 = false
counterexample.export.exportHarness = false

cpa.callstack.depth = 50
cpa.callstack.unsupportedFunctions = pthread_key_create,pthread_getspecific,pthread_setspecific,pthread_cond_wait,pthread_cond_signal,strcpy
