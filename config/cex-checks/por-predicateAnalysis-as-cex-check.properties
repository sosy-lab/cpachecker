// Configuration for checking a counterexample with bitprecise predicate analysis.

#include predicateAnalysis-as-cex-check.properties

#include ../includes/por.properties

CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.predicate.PredicateCPA
cpa.predicate.precision.sharing = GLOBAL
cpa.predicate.blk.threshold = 1

log.consoleLevel = INFO

# POR renames variables with thread-ID prefixes (e.g. T1_t1::tmp) that are not
# in the variable classification. The "ignore irrelevant variables" optimization
# would skip formula encoding for these renamed variables, losing initializer
# constraints.
cpa.predicate.ignoreIrrelevantVariables = false