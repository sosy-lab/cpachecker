// Counterexample check for the POR analyses. Base config; -z3 and -overflows
// variants add to it.

#include predicateAnalysis-as-cex-check.properties

#include ../includes/por.properties

# PointerCPA is inherited from predicateAnalysis-as-cex-check.properties (which
# also sets cpa.pointer2.merge); keep it here so that option stays in use and
# the pointer handling matches the main por-value* analyses.
CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.predicate.PredicateCPA, cpa.pointer2.PointerCPA

# path-precise: no abstraction, one block for the whole path
analysis.algorithm.CEGAR = false
cpa.predicate.blk.threshold = 0
cpa.predicate.blk.alwaysAtLoops = false
cpa.predicate.blk.alwaysAtFunctions = false
cpa.predicate.checkBlockFeasibility = true

log.consoleLevel = INFO

# keep renamed POR variables tracked (not in variable classification)
cpa.predicate.ignoreIrrelevantVariables = false
