// Counterexample check for the POR analyses, with bit-precise predicate analysis.
// This is the base config; -z3 and -overflows variants only add to it.

#include predicateAnalysis-as-cex-check.properties

#include ../includes/por.properties

CompositeCPA.cpas = cpa.mutex.MutexCPA, cpa.predicate.PredicateCPA
cpa.predicate.precision.sharing = GLOBAL

# ---------------------------------------------------------------------------
# Single block for the whole counterexample path.
#
# A counterexample check is sound only if it is path-precise, and the way to get
# that is to do NO abstraction at all: the entire path becomes one block, whose
# path formula is handed to the solver as a single feasibility query. Restated
# explicitly here (rather than inherited) because it is a correctness contract,
# not a tuning knob, and because two of the three switches default to ON.
#
# CEGAR is off in a cex check, so the predicate set is ALWAYS EMPTY. Every
# abstraction computed against an empty predicate set is therefore just "true",
# and it discards the path formula accumulated so far. Any option that ends a
# block early thus throws away facts and can never add any back:
#
#   blk.threshold = 1        -> abstract after every edge. This was set here
#                               once, and it silently turned the check into a
#                               rubber stamp: it retained no facts whatsoever,
#                               could not even see that `*p = 1` implies
#                               `shared == 1` one edge later, and confirmed
#                               spurious counterexamples, turning safe programs
#                               into incorrect-FALSE verdicts. Never set it.
#   blk.alwaysAtLoops        -> defaults to TRUE; must be off.
#   blk.alwaysAtFunctions    -> defaults to TRUE; must be off.
#
# Regression guard: test/programs/por/pointer_write_safe.c, asserted "never
# FALSE" by PORCPATest (see VALUE_IMPRECISE_SAFE_TESTS).
# ---------------------------------------------------------------------------
analysis.algorithm.CEGAR = false
cpa.predicate.blk.threshold = 0
cpa.predicate.blk.alwaysAtLoops = false
cpa.predicate.blk.alwaysAtFunctions = false
cpa.predicate.checkBlockFeasibility = true

log.consoleLevel = INFO

# POR renames variables with thread-ID prefixes (e.g. T1_t1::tmp) that are not
# in the variable classification. The "ignore irrelevant variables" optimization
# would skip formula encoding for these renamed variables, losing initializer
# constraints.
cpa.predicate.ignoreIrrelevantVariables = false
