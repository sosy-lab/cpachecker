// Counterexample check for por-value-z3: identical to the base POR cex check
// (single block for the whole path, see there), but discharged by Z3 instead of
// MathSAT5.
//
// Only the SOLVER is swapped. Deliberately NOT `#include ../includes/nonlin-z3`,
// even though the main por-value-z3 config uses it: that include switches the
// encoding to `encodeBitvectorAs = INTEGER`, which is not bit-precise, and a
// counterexample check must not be more permissive than C. Under an integer
// encoding the check could confirm a path that only "works" because a wraparound
// was modelled as unbounded arithmetic — exactly the kind of infeasible path the
// check exists to reject. Note this costs nothing in practice, because the main
// analysis here is a value analysis and never uses the solver anyway; the z3
// options in por-value-z3 only ever reached the checker.
//
// Plain Z3 (not Z3_WITH_INTERPOLATION): CEGAR is off in a cex check, so no
// interpolation is ever requested.

#include por-predicateAnalysis-as-cex-check.properties

solver.solver = Z3
