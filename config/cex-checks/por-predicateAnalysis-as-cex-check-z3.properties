// Counterexample check for por-value-z3: identical to the base POR cex check
// (single block for the whole path, see there), but discharged by Z3 instead of
// MathSAT5.
//
// Only the SOLVER is swapped. Deliberately NOT `#include ../includes/nonlin-z3`,
// even though the main por-value-z3 config uses it: that include switches the
// encoding to `encodeBitvectorAs = INTEGER` / `handleFieldAccess = false`, which
// cannot express `concat` (see ReplaceBitvectorWithNLAIntegerTheory.concat: it
// throws "concat not implemented for NLA encoding" unless the bitwise-UF
// approximation is enabled). Almost every goblint-regression/pthread-ext task
// initializes a struct-typed variable (e.g. glibc's mutex initializer
// `pthread_mutex_t m = { { 0, 0, 0, 0, 0, { { 0, 0 } } } };`), and encoding that
// initializer needs `concat`; under nonlin-z3 the check then aborts with
// "Counterexample found, but feasibility could not be verified ... Unsupported
// feature (concat not implemented for NLA encoding)". This is the same fix the
// sibling por-pred-z3.properties applies to the predicate analysis's cex check.
//

#include por-predicateAnalysis-as-cex-check.properties

solver.solver = Z3
